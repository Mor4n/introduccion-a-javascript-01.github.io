<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proyecto final - Caja de comentarios</title>
    <link rel="stylesheet" href="style.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    
    <script src="https://kit.fontawesome.com/4c1a0d118c.js" crossorigin="anonymous"></script>

</head>

<body>

    <!-- Menu principal -->

    <main class="main-container">

        <!-- Sección general del post que incluye todo -->
        <section class="post-section">
            <!-- Imagen del post -->
            <div class="img-div">
                <img id="img-post" alt="Imagen de perrito" src="./img/img1.jpg">
            </div>
            
            <div class="post-information-div">
                <!-- Información del que lo publicó que va en la parte superior -->
            <section class="op-information">
                <img src="https://avatars.githubusercontent.com/u/61915148?v=4"  class="user-pfp" id="op-pfp-img" alt="Imagen de perfil de creador del post">
                <p id="op-txt">Mor4n</p>
                <p id="location-txt">Agua Prieta, Sonora</p>
            </section>
            <!-- Descripción del post -->
            <section class="op-post-information">
                <img src="https://avatars.githubusercontent.com/u/61915148?v=4" class="user-pfp" id="op-pfp-img" alt="Imagen de perfil de creador del post">
                <p id="op-txt">Mor4n</p>
                <p id="op-description">Hoy fue un muy bonito dia</p>
                <p id="op-hashtag">#fyp #perrito #olaaaaa</p>
                <p id="op-date">1 d</p>
            </section>


            <!-- Sección de comentarios -->
            <section class="comments-section">

                <section class="comments-container">

                </section>


            </section>

            <section class="interaction-section">
                <div class="interaction-div">
                    <i class="fa-regular fa-heart"></i>
                    <i class="fa-regular fa-comment"></i>
                    <i class="fa-regular fa-paper-plane"></i>
                </div>
                
                <i class="fa-regular fa-bookmark"></i>
            </section>

            <section class="post-information">
                <p id="post-likes">0 <span> Me gusta</span></p>
                <p id="post-date"></p>
            </section>

            <section class="comment-form-section">

                <form id="comment-form">
                    <input type="text" id="username" placeholder="Ingrese su nombre de usuario aquí">

                    <input type="text" id="user_image" placeholder="Ingrese el URL de su imagen">

                    <textarea id="content" placeholder="Agrega un comentario..."></textarea>

                    <button type="submit" id="submit-btn">
                        Publicar
                    </button>
                </form>
            </section>


            </div>


        </section>




    </main>

    <script src="./script.js"></script>
</body>

</html>

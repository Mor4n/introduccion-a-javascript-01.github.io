<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proyecto final - Caja de comentarios</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <!-- Menu de navegacion -->

    <main class="main-container">


        <section class="post-section">

            <div class="img-div">
                <img id="img-post" alt="Imagen de perrito">
            </div>

            <section class="op-information">
                <img id="op-pfp-img" alt="Imagen de perfil de creador del post">
                <p id="op-txt">Mor4n</p>
                <p id="location-txt">Agua Prieta, Sonora</p>
            </section>

            <section class="op-post-information">
                <img id="op-pfp-img" alt="Imagen de perfil de creador del post">
                <p id="op-txt">Mor4n</p>
                <p id="op-description">Hoy fue un muy bonito dia</p>
                <p id="op-hashtag">#fyp #perrito #olaaaaa</p>
                <p id="op-date">1 d</p>
            </section>


        
        <section class="comments-section">

            <section class="comments-container">

            </section>


        </section>

            
        </section>


     
        <section class="post-form-section">
            <h2>Crear Publicación</h2>

            <form id="post-form">
                <input 
                    type="text" 
                    id="username" 
                    placeholder="Ingrese su nombre de usuario aquí"
                >

                <textarea 
                    id="content" 
                    placeholder="Ingrese el contenido"
                ></textarea>

                <button type="submit" id="submit-btn">
                    Publicar
                </button>
            </form>
        </section>
    </main>

    <script src="./script.js"></script>
</body>
</html>

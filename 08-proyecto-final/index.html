<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proyecto final - Caja de comentarios</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <!-- Menu de navegacion -->
    <nav class="nav-bar">
        <h1>Proyecto final módulo 1</h1>
        <button class="create-post-button">Crear post</button>
    </nav>

    <main class="main-container">

        <!-- Formulario para crear un post, lo voy a tener oculto por defecto -->
        <section class="post-form-section">
            <h2>Crear Publicación</h2>

            <form id="post-form">
                <input 
                    type="text" 
                    id="username" 
                    placeholder="Ingrese su nombre de usuario aquí"
                >

                <textarea 
                    id="content" 
                    placeholder="Ingrese el contenido"
                ></textarea>

                <button type="submit" id="submitBtn">
                    Publicar
                </button>
            </form>
        </section>

        <!-- Contenedor general donde pondre las publicaciones -->
        <section class="posts-section">
            <h2>Publicaciones</h2>

            <div id="posts-container">
                
            </div>

        </section>
    </main>

    <script src="./script.js"></script>
</body>
</html>
